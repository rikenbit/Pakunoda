# Mock mode config: runs without R/mwTensor (SVD-based approximation).
# Useful for development and testing.

project:
  id: toy_heterogeneous
  description: "Toy example (mock solver mode)"

blocks:
  - id: expression
    file: data/expression.tsv
    kind: matrix
    modes: [samples, genes]

  - id: methylation
    file: data/methylation.tsv
    kind: matrix
    modes: [samples, cpg_sites]

  - id: interaction
    file: data/interaction.tsv
    kind: matrix
    modes: [genes, proteins]

relations:
  - type: exact
    between:
      - { block: expression, mode: samples }
      - { block: methylation, mode: samples }

  - type: exact
    between:
      - { block: expression, mode: genes }
      - { block: interaction, mode: genes }

solver:
  family: CoupledMWCA

search:
  max_rank: 3
  mock: true
  enabled: true
  goal: imputation
  max_trials: 10
  seed: 42
  rank_range: [2, 3]
  init_policies: [random, svd]
  masking:
    scheme: elementwise
    fraction: 0.1

report:
  output_dir: results
